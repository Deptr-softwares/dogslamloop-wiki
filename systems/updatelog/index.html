<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Log | Dogslamloop Wiki</title>
    <link rel="icon" type="image/jpg" href="../../medias/images/DogslamloopIcon.webp">
    <link rel="stylesheet" href="../../style/Common.css">
    <link rel="stylesheet" href="../../style/UI.css">
    <link rel="stylesheet" href="../../style/ColorCoding.css">
</head>
<body class="site-body p-0">

    <div class="site-layout">
        
        <aside class="global-sidebar-left" id="master-sidebar">
            <div class="sidebar-header-top">
                <img src="../../medias/images/DogslamloopIcon.webp" alt="Site Logo" class="sidebar-site-logo">
                <div class="sidebar-title-container">
                    <a href="../../index.html" class="site-title">dogslamloop wiki</a>
                    <p class="site-subtitle">Alpha v0.1</p>
                </div>
            </div>
            <button class="sidebar-toggle-btn">☰</button>
            <div class="sidebar-nav-title">Navigation</div>
            <div id="global-sidebar-nav">
                <p class="loading-msg loading-msg-sm">Loading menu...</p>
            </div>
        </aside>

        <main class="main-content-area space-y-6">
            
            <div style="margin-bottom:1rem;">
                <a href="../../index.html" style="color:hsl(212, 9%, 58%); text-decoration:none;">← Back to Home</a>
            </div>

            <header class="home-main-header">
                <h1 class="home-main-title">Site Update Log</h1>
                <p class="text-gray-300 text-sm mt-2">A comprehensive, in-depth history of wiki updates, structural changes, and new features.</p>
            </header>

            <!-- The container where the detailed JSON data will be injected -->
            <div id="changelog-container" class="space-y-6">
                <p class="loading-msg">Loading comprehensive update logs...</p>
            </div>

        </main>

        <aside class="local-sidebar-right">
            <div class="sidebar-nav-title">On this page</div>
            <ul class="toc-list" id="dynamic-toc">
                <li><p style="color: hsl(212, 9%, 58%); font-style: italic; font-size: 0.75rem; padding: 0.25rem 0.75rem;">Loading contents...</p></li>
            </ul>
        </aside>

    </div>

    <!-- Core Scripts -->
    <script src="../../js/site_utils.js"></script>
    <script src="../../js/site_meta.js"></script>
    <script src="../../js/pagebuilder.js"></script>

    <!-- Dynamic Fetch Script -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.loadPageAlerts === 'function') {
                await window.loadPageAlerts('Update Log');
            }

            const container = document.getElementById('changelog-container');
            const rootPath = typeof window.getRootPath === 'function' ? window.getRootPath() : '../../';

            try {
                // Fetch the existing updatelog.json using the project's standard promise-cached utility
                let data;
                const jsonPath = `${rootPath}data/updates.json`;
                
                if (typeof window.fetchJson === 'function') {
                    data = await window.fetchJson(jsonPath);
                } else {
                    const response = await fetch(jsonPath);
                    if (!response.ok) throw new Error("Network response was not ok");
                    data = await response.json();
                }

                if (!data || !data.changelogs) throw new Error("Invalid format in updatelog.json");

                container.innerHTML = ''; // Clear loading message

                data.changelogs.forEach(log => {
                    const section = document.createElement('section');
                    section.className = 'wiki-section';
                    section.style.marginBottom = '2rem';

                    // Heading: Date + Version + Title
                    const title = document.createElement('h2');
                    title.className = 'section-title section-title-clean mb-4';
                    title.innerHTML = `
                        <span style="color:hsl(212, 9%, 58%); font-weight:normal; margin-right:8px;">[${log.date}]</span> 
                        <span style="color:var(--accent-blue); margin-right:8px;">${log.version}</span> 
                        ${log.title}
                    `;
                    
                    // Meta details block (Description & Type)
                    const metaBlock = document.createElement('div');
                    metaBlock.className = 'strategy-paragraph';
                    metaBlock.style.marginBottom = '1rem';
                    metaBlock.style.padding = '1rem';
                    metaBlock.style.backgroundColor = 'var(--bg-card)';
                    metaBlock.style.borderRadius = '0.5rem';
                    metaBlock.innerHTML = `
                        <div style="margin-bottom: 0.5rem;">
                            <span style="color:hsl(212, 9%, 58%); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">Update Type:</span> 
                            <span style="color: #fff; font-weight: bold; margin-left: 5px;">${log.type}</span>
                        </div>
                        <div>
                            <span style="color:hsl(212, 9%, 58%); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">Description:</span> 
                            <span style="color: #fff; margin-left: 5px;">${log.description}</span>
                        </div>
                    `;

                    // Unordered list for detailed changes
                    const ul = document.createElement('ul');
                    ul.className = 'text-gray-300 text-sm leading-relaxed';
                    ul.style.listStyleType = 'disc';
                    ul.style.paddingLeft = '1.5rem';
                    ul.style.margin = '0';

                    if (log.changes && log.changes.length > 0) {
                        log.changes.forEach(change => {
                            const li = document.createElement('li');
                            li.textContent = change;
                            li.style.marginBottom = '0.5rem';
                            ul.appendChild(li);
                        });
                    } else {
                        const li = document.createElement('li');
                        li.textContent = "No specific changes listed for this update.";
                        li.style.color = "hsl(212, 9%, 58%)";
                        li.style.fontStyle = "italic";
                        ul.appendChild(li);
                    }

                    section.appendChild(title);
                    section.appendChild(metaBlock);
                    section.appendChild(ul);
                    container.appendChild(section);
                });

                // Generate TOC so users can skip directly to specific versions
                if (typeof window.generateTOC === 'function') {
                    window.generateTOC(container);
                } else if (typeof window.refreshTOC === 'function') {
                    window.refreshTOC();
                }

            } catch (error) {
                console.error("Error fetching update logs:", error);
                container.innerHTML = '<p style="color: hsl(0, 80%, 60%);">Unable to load comprehensive update logs at this time. Please ensure data/updatelog.json is correctly formatted.</p>';
            }
        });
    </script>
</body>
</html>
