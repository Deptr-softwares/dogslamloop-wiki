                <a href="https://Ko-fi.com/deptr_software_coffee_corner" target="_blank" class="btn-sys btn-sys-yellow" style="width: 100%; padding: 0.75rem; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">

                    <button id="nav-overview" class="btn-manga btn-manga-slanted active"><div class="btn-manga-content"><span class="btn-manga-text">Overview & Strategy</span></div></button>
                    <button id="nav-m1s" class="btn-manga btn-manga-slanted"><div class="btn-manga-content"><span class="btn-manga-text">M1s</span></div></button>
                    <button id="nav-skills" class="btn-manga btn-manga-slanted"><div class="btn-manga-content"><span class="btn-manga-text">Skills</span></div></button>
                    <button id="nav-specials" class="btn-manga btn-manga-slanted"><div class="btn-manga-content"><span class="btn-manga-text">Specials</span></div></button>
                    <button id="nav-matchups" class="btn-manga btn-manga-slanted"><div class="btn-manga-content"><span class="btn-manga-text">Matchups</span></div></button>
                    <button id="nav-counterplay" class="btn-manga btn-manga-slanted"><div class="btn-manga-content"><span class="btn-manga-text">Counterplay</span></div></button>

                    <style>
                        #btn-edit-current-tab-mobile { display: none !important; }

                            #btn-edit-current-tab-mobile.is-active { display: flex !important; }

                    </style>
                    <button id="btn-edit-current-tab-mobile" class="btn-sys btn-sys-regular" style="margin-left: auto; font-size: 0.7rem; padding: 0.4rem 0.75rem; align-items: center; gap: 0.4rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        EDIT TAB
                    </button>
                </nav>
            </header>

            <div id="tab-overview" class="tab-content"></div>
            <div id="tab-m1s" class="tab-content hidden"></div>
            <div id="tab-skills" class="vessel-content space-y-8 hidden"></div>
            <div id="tab-specials" class="tab-content hidden"></div>

            <div id="tab-counterplay" class="vessel-content hidden"></div>

                <aside class="local-sidebar-right">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border-color);">
                <div class="sidebar-master-title" style="margin: 0; padding: 0; border: none;">On this tab</div>
                
                <button id="btn-edit-current-tab" class="btn-sys btn-sys-regular" style="display: none; font-size: 0.6rem; padding: 0.25rem 0.5rem; align-items: center; gap: 0.35rem;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    EDIT TAB
                </button>
            </div>

            <ul class="toc-list" id="dynamic-toc">
                <li><p class="loading-msg">Loading contents...</p></li>
            </ul>
        </aside>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="../../js/site_utils.js"></script>
    <script src="../../js/site_meta.js"></script>
    <script src="../../js/pagebuilder.js"></script>
    <script src="../../js/framedata.js"></script>
    <script src="../../js/description.js"></script>
    <script src="../../js/internalstyling.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Boot the Master Global Sidebars
            if (window.initSidebarToggle) window.initSidebarToggle();
            if (window.buildGlobalSidebarMenu) window.buildGlobalSidebarMenu('global-sidebar-nav');
            if (window.initSidebarEditButton) window.initSidebarEditButton(); 

            if (window.initTabEditorButtons) window.initTabEditorButtons('vessel', 'character');

            // 2. Setup Inner Tab Navigation
            if (window.setupTabs) setupTabs('nav', 'tab', ['overview', 'm1s', 'skills', 'specials', 'matchups', 'counterplay', 'gallery'], 'major');

            // 3. Fire all Data Fetchers Concurrently (No blocking 'await')
            if (typeof window.loadMoveSection === 'function') {
                window.loadMoveSection('vessel', 'skills');
                window.loadMoveSection('vessel', 'm1s');
                window.loadMoveSection('vessel', 'specials');
            }

            if (typeof window.loadPageDescriptions === 'function') {
                window.loadPageDescriptions('vessel', 'character');
            }

            if (typeof window.loadPageAlerts === 'function') {
                window.loadPageAlerts('Vessel');
            }

            // 4. Delay the TOC mapping to ensure all content blocks have been injected
            setTimeout(() => {
                if (window.refreshTOC) window.refreshTOC();
            }, 500);
        });
    </script>
