<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vessel | Dogslamloop</title>
    <link rel="stylesheet" href="../style/Common.css">
    <link rel="stylesheet" href="../style/UI.css">
    <link rel="stylesheet" href="../style/ColorCoding.css">
</head>
<body class="site-body">

    <header class="global-header max-w-6xl">
        <div>
            <a href="../index.html" class="site-title">dogslamloop wiki</a>
            <p class="site-subtitle">Alpha v0.03 | The Competitive JJS Wiki</p>
        </div>
    </header>

    <main class="max-w-6xl w-full flex-grow space-y-8">
        
        <div style="margin-bottom:1rem;">
            <a href="../index.html" style="color:hsl(212, 9%, 58%); text-decoration:none;">← Roster</a>
        </div>

        <header class="character-header">
            <h2 class="character-title">Vessel</h2>
            <nav class="character-nav">
                <button id="nav-overview" class="nav-btn active">Overview & Strategy</button>
                <button id="nav-m1s" class="nav-btn">M1s</button>
                <button id="nav-skills" class="nav-btn">Skills</button>
                <button id="nav-specials" class="nav-btn">Specials</button>
                <button id="nav-matchups" class="nav-btn">Matchups</button>
                <button id="nav-counterplay" class="nav-btn">Counterplay</button>
                <button id="nav-gallery" class="nav-btn">Gallery</button>
            </nav>
        </header>

        <div id="tab-overview" class="tab-content"></div>

        <div id="tab-m1s" class="tab-content hidden"></div>

        <div id="tab-skills" class="vessel-content space-y-8 hidden"></div>

        <div id="tab-specials" class="tab-content hidden"></div>

        <div id="tab-matchups" class="vessel-content hidden"></div>

        <div id="tab-counterplay" class="vessel-content hidden"></div>

        <div id="tab-gallery" class="vessel-content hidden"></div>

    </main>

    <script src="../js/pagebuilder.js"></script>
    <script src="../js/framedata.js"></script>
    <script src="../js/description.js"></script>
    <script src="../js/internalstyling.js"></script>
    
    <script>
        setupTabs('nav', 'tab', ['overview', 'm1s', 'skills', 'specials', 'matchups', 'counterplay', 'gallery']);
        
        if (typeof loadMoveSection === 'function') {
        loadMoveSection('vessel', 'skills');
        loadMoveSection('vessel', 'm1s');
        loadMoveSection('vessel', 'specials');
    }

        if (typeof loadCharacterDescriptions === 'function') {
            loadCharacterDescriptions('vessel');
        }
    </script>
</body>
</html>
