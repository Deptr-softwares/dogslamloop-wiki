<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Contributor Editor</title>
    <link rel="stylesheet" href="style/Common.css">
    <link rel="stylesheet" href="style/UI.css">
    <link rel="stylesheet" href="style/ColorCoding.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="style/editor.css">
</head>
<body>
    <div id="editor-custom-modal" class="editor-modal-overlay modal-danger" style="display: none;">
        <div class="editor-modal-box auth-modal-box">
            <div class="auth-header">
                <h3>SYSTEM CONFIRMATION</h3>
            </div>
            <div class="auth-body auth-body-centered">
                <p id="editor-modal-text" class="modal-prompt-text">Are you sure?</p>
                <div class="modal-actions-centered">
                    <button id="editor-modal-cancel" class="system-page-btn">CANCEL</button>
                    <button id="editor-modal-confirm" class="submit-btn btn-danger-fill">DELETE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editor-alert-modal" class="editor-modal-overlay alert-layer modal-warning" style="display: none;">
        <div class="editor-modal-box auth-modal-box">
            <div class="auth-header">
                <h3>SYSTEM WARNING</h3>
            </div>
            <div class="auth-body auth-body-centered">
                <p id="editor-alert-msg" class="modal-prompt-text pre-wrap"></p>
                <button onclick="document.getElementById('editor-alert-modal').style.display='none'" class="submit-btn btn-warning-outline">ACKNOWLEDGE</button>
            </div>
        </div>
    </div>

    <!-- QA / SUBMISSION METADATA MODAL -->
    <div id="qa-modal-overlay" class="editor-modal-overlay" style="display: none; z-index: 10005;">
        <div class="editor-modal-box auth-modal-box" style="border-top-color: #a855f7; width: 500px;">
            <div class="auth-header" style="border-bottom: 1px solid #333; background: #050505;">
                <h3 style="color: #a855f7; font-size: 1rem;">QUALITY ASSURANCE</h3>
            </div>
            <div class="auth-body" style="padding: 1.5rem; text-align: left;">
                <p style="font-family: var(--text-mono); font-size: 0.75rem; color: #888; margin-top: 0; margin-bottom: 1.5rem;">Please provide context for your changes to assist the staff review process.</p>
                
                <div class="editor-row" style="flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                    <label style="font-family: var(--text-mono); font-size: 0.65rem; color: #888;">CHANGELOG / SUMMARY OF CHANGES</label>
                    <textarea id="qa-changelog" class="editor-textarea" placeholder="e.g. Added M1 frame data, fixed Vessel combo typo..." style="min-height: 60px; margin: 0;"></textarea>
                </div>

                <div class="editor-row" style="flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                    <label style="font-family: var(--text-mono); font-size: 0.65rem; color: #888;">DATA CONFIDENCE RATING</label>
                    <select id="qa-confidence" class="editor-select" style="margin: 0; font-weight: bold;">
                        <option value="high" style="color: #22c55e;">High (Frame-stepped / Datamined / Dev Confirmed)</option>
                        <option value="medium" style="color: #eab308;" selected>Medium (In-game testing / Reputable source)</option>
                        <option value="low" style="color: #ef4444;">Low (Eyeballed / Estimated / Unverified)</option>
                        <option value="n/a" style="color: #888;">N/A (Just fixing typos or formatting)</option>
                    </select>
                </div>

                <div class="editor-row" style="flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <label style="font-family: var(--text-mono); font-size: 0.65rem; color: #888;">EVIDENCE / SOURCING LINK (Optional)</label>
                    <input type="text" id="qa-evidence" class="editor-input" placeholder="YouTube, Streamable, or Doc link..." style="margin: 0;">
                </div>
            </div>
            <div class="editor-modal-actions" style="border-top: 1px dashed #333; padding-top: 1rem; margin-top: 0; justify-content: flex-end; gap: 1rem;">
                <button onclick="document.getElementById('qa-modal-overlay').style.display='none'" class="system-page-btn">CANCEL</button>
                <button id="btn-qa-confirm-submit" class="submit-btn" style="color: #000; background-color: #a855f7; border-color: #a855f7;">CONFIRM & UPLOAD</button>
            </div>
        </div>
    </div>

    <div id="media-modal-overlay" class="editor-modal-overlay" style="display: none;">
        <div class="editor-modal-box media-modal-box">
            <div class="auth-header">
                <h3>MEDIA LIBRARY</h3>
            </div>
            <div class="auth-body media-modal-body">
                <div class="media-toolbar">
                    <input type="text" id="media-search-input" class="editor-input media-search-input" placeholder="Search by filename..." autocomplete="off" spellcheck="false">
                    <select id="media-filter-select" class="editor-input media-filter-select">
                        <option value="all">All Media</option>
                        <option value="image">Images (WEBP/PNG/JPG)</option>
                        <option value="video">Videos & GIFs</option>
                    </select>
                </div>
                
                <div id="media-gallery-grid"></div>
                
                <div class="media-modal-footer" style="display: grid; grid-template-columns: 1fr auto auto; gap: 2rem; align-items: center;">
                    <div id="media-upload-zone" style="margin-right: 0;">
                        <span id="media-upload-text">+ Drop file or click to upload to Cloud</span>
                        <input type="file" id="media-file-input" style="display: none;" accept="image/*,video/*">
                    </div>
                    
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <button id="btn-media-prev" class="system-page-btn" style="padding: 0.25rem 0.5rem;">◄ PREV</button>
                        <span id="media-page-indicator" style="font-family: var(--text-mono); font-size: 0.75rem; color: var(--text-white); width: 80px; text-align: center;">PAGE 1/1</span>
                        <button id="btn-media-next" class="system-page-btn" style="padding: 0.25rem 0.5rem;">NEXT ►</button>
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <button id="btn-media-refresh" class="system-page-btn">↻ Refresh</button>
                        <button onclick="document.getElementById('media-modal-overlay').style.display='none';" class="submit-btn btn-action-delete">Close</button>
                    </div>
                </div>
            </div> 
        </div>
    </div>

    <div class="editor-layout">
        <div class="editor-workspace">
            <div class="editor-header">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div style="flex: 1; min-width: 0;">
                        <h2 class="editor-title" id="editor-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Loading...</h2>
                        <span class="editor-subtitle" id="editor-subtitle" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;">Connecting to database...</span>
                    </div>
                    <div style="display: flex; gap: 0.5rem; flex-direction: column; align-items: flex-end; flex-shrink: 0;">
                        <a href="index.html" class="system-page-btn" style="padding: 0.2rem 0.4rem; font-size: 0.6rem;">HUB</a>
                        <button id="mobile-preview-toggle" class="submit-btn" style="display: none; font-size: 0.6rem; padding: 0.3rem;" onclick="window.toggleMobilePreview()">SHOW PREVIEW</button>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="system-page-btn" onclick="window.history.back()">Cancel</button>
                    <button class="submit-btn btn-sync-preview" onclick="window.triggerManualSync()">Sync Preview</button>
                    <button class="submit-btn" id="submit-payload-btn">Submit to Queue</button>
                </div>
            </div>

            <div id="interactive-builder"></div>
        </div>

        <div class="live-preview-pane">
            
            <button class="mobile-back-to-editor" onclick="window.toggleMobilePreview()">
                <span style="font-size: 1rem; margin-right: 0.5rem;">←</span> BACK TO EDITOR
            </button>

            <div class="preview-badge">PREVIEW</div>
            
            <div class="mock-window-wrapper">
                <div class="mock-window-bar">
                    <div class="mock-window-dot dot-close"></div>
                    <div class="mock-window-dot dot-min"></div>
                    <div class="mock-window-dot dot-max"></div>
                    <span class="mock-window-text">dogslamloop.wiki / Live Layout</span>
                    
                    <button id="btn-toggle-diff" onclick="window.toggleDiffMode()" class="add-block-btn" style="margin-left: auto; color: #a855f7; border-color: #a855f7; font-size: 0.65rem; padding: 0.15rem 0.5rem; transition: all 0.2s;">[+] DIFF VIEW</button>
                </div>

                <main class="main-content mock-window-content">
                    <div class="main-content-area">
                        <div id="tab-overview" class="tab-content" style="display: none;"></div>
                        <div id="tab-m1s" class="tab-content" style="display: none;"></div>
                        <div id="tab-skills" class="vessel-content space-y-8" style="display: none;"></div>
                        <div id="tab-specials" class="tab-content" style="display: none;"></div>
                        <div id="tab-matchups" class="vessel-content" style="display: none;"></div>
                        <div id="tab-counterplay" class="vessel-content" style="display: none;"></div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/site_utils.js"></script>
    <script src="js/framedata.js"></script>
    <script src="js/description.js"></script>
    <script src="js/internalstyling.js"></script>
    <script src="js/editor.js?v1.1"></script>
</body>
</html>
